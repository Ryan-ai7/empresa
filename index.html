<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nome da Marca</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 2px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
    }

    .hero h2 {
      font-size: 40px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .section {
      padding: 60px 40px;
      text-align: center;
    }

    .products {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 250px;
      background: #111;
      padding: 15px;
      border: 1px solid #222;
    }

    .card img {
      width: 100%;
    }

    footer {
      padding: 30px;
      text-align: center;
      border-top: 1px solid #222;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>SUA MARCA</h1>
  <nav>
    <a href="#">Início</a>
    <a href="#">Coleção</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>NOVA COLEÇÃO EM BREVE</h2>
    <a href="#" class="btn">Acompanhar</a>
  </div>
</section>

<section class="section">
  <h2>Prévia da Coleção</h2>
  <div class="products">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975922326-9d2a9c53c64f">
      <p>Camiseta Street</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <p>Moletom Premium</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521336575822-6da63fb45455">
      <p>Conjunto Urban</p>
    </div>

  </div>
</section>

<section class="section">
  <h2>Sobre a Marca</h2>
  <p>Uma nova geração de estilo, atitude e identidade. Em breve nas ruas.</p>
</section>

<footer>
  <p>© 2026 SUA MARCA - Todos os direitos reservados</p>
</footer>

</body>
</html>
